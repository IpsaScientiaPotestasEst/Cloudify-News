<svg width="160" height="110" viewBox="0 0 160 110" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D-style cloud -->
  <defs>
    <!-- Soft shading gradient -->
    <radialGradient id="cloudShade" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#e6f0ff"/>
      <stop offset="100%" stop-color="#d0e0f5"/>
    </radialGradient>

    <!-- Slight inner shadow -->
    <radialGradient id="innerShadow" cx="50%" cy="60%" r="80%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <!-- Cloud body -->
  <g transform="translate(20,20)">
    <path
      d="M30 40
         C20 40,15 30,22 22
         C25 10,40 8,50 16
         C60 4,80 6,88 20
         C100 18,110 28,108 40
         C110 52,100 60,85 60
         L45 60
         C35 60,30 52,30 40Z"
      fill="url(#cloudShade)"
    />

    <!-- Inner shadow for depth -->
    <path
      d="M30 40
         C20 40,15 30,22 22
         C25 10,40 8,50 16
         C60 4,80 6,88 20
         C100 18,110 28,108 40
         C110 52,100 60,85 60
         L45 60
         C35 60,30 52,30 40Z"
      fill="url(#innerShadow)"
      opacity="0.35"
    />

    <!-- Glossy highlight -->
    <path
      d="M45 28
         C55 20,75 20,85 32"
      stroke="rgba(255,255,255,0.7)"
      stroke-width="6"
      stroke-linecap="round"
      fill="none"
      opacity="0.6"
    />
  </g>
</svg>
