<svg width="180" height="120" viewBox="0 0 180 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft fluffy gradient -->
    <radialGradient id="fluffyGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f2f6ff"/>
      <stop offset="100%" stop-color="#e3ecfa"/>
    </radialGradient>

    <!-- Gentle depth shadow -->
    <radialGradient id="depthShadow" cx="50%" cy="60%" r="80%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.10)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <!-- Cloud shape -->
  <g transform="translate(20,20)">
    <path
      d="M40 55
         C25 55,18 42,26 33
         C30 18,48 15,60 25
         C70 10,95 12,105 30
         C120 28,130 40,128 55
         C130 70,118 80,95 80
         L55 80
         C45 80,40 70,40 55Z"
      fill="url(#fluffyGrad)"
    />

    <!-- Soft internal shading -->
    <path
      d="M40 55
         C25 55,18 42,26 33
         C30 18,48 15,60 25
         C70 10,95 12,105 30
         C120 28,130 40,128 55
         C130 70,118 80,95 80
         L55 80
         C45 80,40 70,40 55Z"
      fill="url(#depthShadow)"
      opacity="0.25"
    />
  </g>
</svg>
