<svg width="600" height="360" viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft cool gradient approximating the cloud's lighting -->
    <radialGradient id="cloudFill" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#d3ddef"/>
    </radialGradient>

    <!-- Gentle underside shading -->
    <radialGradient id="cloudDepth" cx="50%" cy="75%" r="90%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.10)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <!-- Cloud silhouette based on your uploaded image -->
  <path
    d="
      M180 220
      C150 220,130 190,140 165
      C155 130,200 120,235 145
      C260 100,330 105,360 160
      C395 155,420 185,415 215
      C420 250,395 270,345 270
      L235 270
      C205 270,180 245,180 220Z"
    fill="url(#cloudFill)"
  />

  <!-- Soft underside shading (no shadow underneath) -->
  <path
    d="
      M180 220
      C150 220,130 190,140 165
      C155 130,200 120,235 145
      C260 100,330 105,360 160
      C395 155,420 185,415 215
      C420 250,395 270,345 270
      L235 270
      C205 270,180 245,180 220Z"
    fill="url(#cloudDepth)"
    opacity="0.30"
  />
</svg>
