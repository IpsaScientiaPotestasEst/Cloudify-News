<svg width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft blue background behind cloud (optional) -->
  <rect x="0" y="0" width="120" height="80" rx="16" fill="#E3F4FF" />

  <!-- Cloud with outline -->
  <g transform="translate(15,18)">
    <!-- Cloud base -->
    <ellipse cx="45" cy="30" rx="32" ry="18" fill="#FFFFFF" />

    <!-- Fluffy bumps -->
    <circle cx="30" cy="26" r="12" fill="#FFFFFF" />
    <circle cx="45" cy="22" r="14" fill="#FFFFFF" />
    <circle cx="60" cy="26" r="12" fill="#FFFFFF" />

    <!-- Outline -->
    <path
      d="M20 30
         C20 22,28 18,34 20
         C35 14,42 12,48 14
         C52 12,60 14,62 20
         C68 18,76 22,76 30
         C76 38,68 42,45 42
         C30 42,20 38,20 30Z"
      fill="none"
      stroke="#7BA0C8"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Tiny highlight for cartoony feel -->
    <path
      d="M34 24 C36 22,40 21,43 22"
      fill="none"
      stroke="#F0FBFF"
      stroke-width="2"
      stroke-linecap="round"
    />
  </g>
</svg>