<svg width="180" height="120" viewBox="0 0 180 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft fluffy gradient -->
    <radialGradient id="fluffyGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f2f6ff"/>
      <stop offset="100%" stop-color="#e3ecfa"/>
    </radialGradient>

    <!-- Gentle depth shadow -->
    <radialGradient id="depthShadow" cx="50%" cy="60%" r="80%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.10)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <!-- Cloud shape (no top-left bump) -->
  <g transform="translate(20,20)">
    <path
      d="M45 55
         C32 55,26 45,30 36
         C34 25,50 22,62 30
         C75 20,95 22,105 35
         C120 35,130 45,128 58
         C130 72,118 82,95 82
         L55 82
         C45 82,45 70,45 55Z"
      fill="url(#fluffyGrad)"
    />

    <!-- Soft internal shading -->
    <path
      d="M45 55
         C32 55,26 45,30 36
         C34 25,50 22,62 30
         C75 20,95 22,105 35
         C120 35,130 45,128 58
         C130 72,118 82,95 82
         L55 82
         C45 82,45 70,45 55Z"
      fill="url(#depthShadow)"
      opacity="0.25"
    />
  </g>
</svg>
