<svg width="420" height="260" viewBox="0 0 420 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft fluffy gradient -->
    <radialGradient id="fluffyGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f2f6ff"/>
      <stop offset="100%" stop-color="#e3ecfa"/>
    </radialGradient>

    <!-- Gentle depth shadow -->
    <radialGradient id="depthShadow" cx="50%" cy="60%" r="80%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.10)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <!-- Cloud shape (smooth left side, no bump) -->
  <g transform="translate(40,40)">
    <path
      d="M120 140
         C90 140,70 115,78 95
         C90 60,130 55,160 80
         C190 50,250 55,275 95
         C310 95,335 120,330 150
         C335 185,310 210,260 210
         L160 210
         C135 210,120 185,120 140Z"
      fill="url(#fluffyGrad)"
    />

    <!-- Soft internal shading -->
    <path
      d="M120 140
         C90 140,70 115,78 95
         C90 60,130 55,160 80
         C190 50,250 55,275 95
         C310 95,335 120,330 150
         C335 185,310 210,260 210
         L160 210
         C135 210,120 185,120 140Z"
      fill="url(#depthShadow)"
      opacity="0.25"
    />
  </g>
</svg>
