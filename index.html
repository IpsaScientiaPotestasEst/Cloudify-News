<!DOCTYPE html>
<html>

<head>

    <title>Cloudify News</title>
    <link rel="icon" href="Acloud.png">

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #1e1f29;
            overflow: hidden;
            position: relative;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .ripple {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 1200px;
            height: 1200px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(0, 150, 255, 1) 0%, rgba(0, 150, 255, 0.5) 40%, transparent 70%);
            animation: pulse 8s ease-out infinite;
            pointer-events: none;
            opacity: 1;
            filter: blur(2px);
            z-index: 0;
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }

            65% {
                transform: translate(-50%, -50%) scale(3.4);
                opacity: 0.45;
            }

            100% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
        }

        #weather-card {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            position: relative;
            z-index: 2;
        }

        #time {
            font-size: 60px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
        }

        .circle-row {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .weather-circle {
            width: 260px;
            height: 260px;
            background: linear-gradient(145deg, #ffffff 0%, #eef3ff 100%);
            border-radius: 50%;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.35);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .weather-circle::before {
            content: "";
            position: absolute;
            top: -25px;
            right: -25px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.75), transparent);
            border-radius: 50%;
        }

        .weather-circle::after {
            content: "";
            position: absolute;
            bottom: -30px;
            left: -30px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.45), transparent);
            border-radius: 50%;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            color: #3c4a63;
        }

        .backText {
            font-size: 36px;
            font-weight: 800;
        }

        #temp {
            color: #e63946;
        }

        #uv {
            color: #5a00d9;
            font-size: 29px !important;
        }

        #rain {
            color: #0353d3;
        }
    </style>

</head>

<body>

    <div class="ripple"></div>

    <div id="weather-card">

        <div id="time"></div>

        <div class="circle-row">
            <div id="temp-box" class="weather-circle">
                <div class="section-title">Temperature</div>
                <div id="temp" class="backText"></div>
            </div>

            <div id="uv-box" class="weather-circle">
                <div class="section-title">Brightness</div>
                <div id="uv" class="backText"></div>
            </div>

            <div id="rain-box" class="weather-circle">
                <div class="section-title">Rainfall</div>
                <div id="rain" class="backText"></div>
            </div>
        </div>

    </div>

    <script>


        if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            document.body.innerHTML = "<h2>This app is not available on mobile devices.</h2>";
        }


        function BugTime(context = "") {
            const now = new Date();
            const t = now.toLocaleTimeString("en-NZ", {
                hour: "numeric",
                minute: "2-digit",
                hour12: true
            });
            console.log("Bugged at:", t);
        }

        function time() {
            let now = new Date();
            let t = now.toLocaleTimeString("en-NZ", {
                hour: "numeric",
                minute: "2-digit",
                hour12: true
            });
            document.getElementById("time").textContent = t;
        }

        setInterval(() => { time(); }, 1000);

        async function loadWeather(lat, lon) {
            try {

                const res = await fetch(`https://cloudify-news.onrender.com/weather?lat=${lat}&lon=${lon}`);
                const data = await res.json();


                let temp = "N/A";
                if (data.current && typeof data.current.temperature !== "undefined") {
                    temp = data.current.temperature;
                } else {
                    BugTime();
                }
                document.getElementById("temp").textContent = temp + "°C";



                let now = new Date();
                let y = now.getFullYear();
                let m = String(now.getMonth() + 1).padStart(2, "0");
                let d = String(now.getDate()).padStart(2, "0");
                let h = String(now.getHours()).padStart(2, "0");

                let nowKey = `${y}-${m}-${d}T${h}:00`;

                let idx = -1;
                if (data.hourly && data.hourly.time && data.hourly.time.length > 0) {
                    idx = data.hourly.time.indexOf(nowKey);
                }
                if (idx === -1) {
                    BugTime();
                    idx = 0;
                }



                let uv = 0;
                if (data.hourly && data.hourly.radiation && data.hourly.radiation.length > idx) {
                    uv = data.hourly.radiation[idx] / 100;
                } else {
                    BugTime();
                }

                let uvText = "";
                if (uv <= 0.2) uvText = "No light";
                else if (uv <= 2) uvText = "Low light";
                else if (uv <= 5) uvText = "Moderate light";
                else if (uv <= 7) uvText = "High light";
                else if (uv <= 10) uvText = "Very high light";
                else uvText = "Extreme light";

                document.getElementById("uv").textContent = uvText;



                let rain = 0;

                if (data.minutely && data.minutely.rain && data.minutely.rain.length > 0) {
                    rain = data.minutely.rain[0];
                } else if (data.hourly && data.hourly.rain && data.hourly.rain.length > idx) {
                    rain = data.hourly.rain[idx];
                } else {
                    BugTime();
                }

                document.getElementById("rain").textContent = "Rain: " + rain + " mm";


            } catch (err) {

                BugTime("Weather fetch failed");

                document.getElementById("temp").innerText = "Error";
                document.getElementById("uv").innerText = "Error";
                document.getElementById("rain").innerText = "Error";
            }
        }

        navigator.geolocation.getCurrentPosition(pos => {
            const latitude = pos.coords.latitude;
            const longitude = pos.coords.longitude;
            loadWeather(latitude, longitude);
            setInterval(() => { loadWeather(latitude, longitude); }, 60000);
        }, err => {
            loadWeather(-38.1, 175.3);
            setInterval(() => { loadWeather(-38.1, 175.3); }, 60000);
        });

        setInterval(() => {
            fetch("https://cloudify-news.onrender.com/ping").catch(() => { });
        }, 600000);

    </script>

</body>

</html>
